<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Messaging · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 lg:px-6">
    <a href="../../index.html" class="text-lg font-bold tracking-tight text-indigo-700">TalentBridge</a>
    <nav aria-label="Primary" class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a class="text-slate-600 hover:text-indigo-700" href="../../index.html">Page map</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Support</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Settings</a>
    </nav>
    <div class="flex items-center gap-2">
      <span class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-indigo-200">Recruiter · Full</span>
      <button aria-label="Open notifications" class="rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700">Alerts</button>
    </div>
  </div>
</header>
  <main id="main-content" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    
<section class="rounded-2xl border border-slate-200 bg-white p-6">
  <h1 class="text-xl font-semibold">Conversation workspace</h1>
  <p class="mt-2 text-sm text-slate-600">Messaging activates after candidate permission approval. All events are logged.</p>
  <div class="mt-4 space-y-2 text-sm">
    <div class="rounded-lg bg-slate-100 p-3">Candidate: Thursday works for interview. <span class="text-xs text-slate-500">11:08</span></div>
    <div class="rounded-lg bg-indigo-100 p-3">You: Great, sending request now. <span class="text-xs text-slate-500">11:09</span></div>
  </div>
  <div class="mt-4 flex flex-wrap gap-2">
    <button class="rounded-xl bg-indigo-600 px-4 py-2 text-white">Send interview request</button>
    <button class="rounded-xl bg-emerald-600 px-4 py-2 text-white">Send job offer</button>
    <a href="offers.html" class="rounded-xl border border-slate-300 px-4 py-2">View offer tracker</a>
  </div>
</section>
  </main>
</body>
</html>
