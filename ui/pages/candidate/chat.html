<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Messaging · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 lg:px-6">
    <a href="../../index.html" class="text-lg font-bold tracking-tight text-indigo-700">TalentBridge</a>
    <nav aria-label="Primary" class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a class="text-slate-600 hover:text-indigo-700" href="../../index.html">Page map</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Support</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Settings</a>
    </nav>
    <div class="flex items-center gap-2">
      <span class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-indigo-200">Candidate</span>
      <button aria-label="Open notifications" class="rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700">Alerts</button>
    </div>
  </div>
</header>
  <main id="main-content" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    
<section class="grid gap-4 lg:grid-cols-3">
  <aside class="rounded-2xl border border-slate-200 bg-white p-4">
    <h2 class="font-semibold">Conversations</h2>
    <ul class="mt-3 space-y-2 text-sm">
      <li class="rounded-lg bg-indigo-50 p-2 ring-1 ring-indigo-200">Acme Corp · permission approved</li>
      <li class="rounded-lg bg-slate-50 p-2">Nova Systems · pending</li>
    </ul>
  </aside>
  <article class="rounded-2xl border border-slate-200 bg-white p-4 lg:col-span-2">
    <h2 class="font-semibold">Real-time chat</h2>
    <div class="mt-3 space-y-2 text-sm">
      <div class="rounded-lg bg-slate-100 p-3">Recruiter: Can we schedule technical interview? <span class="text-xs text-slate-500">10:45</span></div>
      <div class="rounded-lg bg-indigo-100 p-3">You: Yes, I am available Friday. <span class="text-xs text-slate-500">10:47</span></div>
    </div>
    <div class="mt-4 flex flex-wrap gap-2">
      <button class="rounded-xl bg-indigo-600 px-3 py-2 text-sm font-semibold text-white">Accept interview request</button>
      <button class="rounded-xl border border-slate-300 px-3 py-2 text-sm">Reject offer</button>
    </div>
    <form class="mt-4 flex gap-2"><input aria-label="Message input" class="flex-1 rounded-xl border border-slate-300 px-3 py-2" placeholder="Type a message" /><button class="rounded-xl bg-slate-900 px-4 py-2 text-white">Send</button></form>
  </article>
</section>
  </main>
</body>
</html>
