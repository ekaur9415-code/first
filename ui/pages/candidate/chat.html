<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Messaging · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-brand-50: #eef2ff;
      --color-brand-500: #6366f1;
      --color-brand-600: #4f46e5;
      --color-brand-700: #4338ca;
      --color-surface: #ffffff;
      --color-app: #f8fafc;
      --radius-card: 1rem;
      --shadow-soft: 0 10px 30px -12px rgb(2 6 23 / 0.2);
    }

    @utility card {
      @apply rounded-card border border-slate-200/70 bg-surface shadow-soft;
    }

    @utility btn-primary {
      @apply inline-flex items-center justify-center rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700;
    }

    @utility btn-secondary {
      @apply inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50;
    }
  </style>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="bg-app text-slate-900">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 lg:px-6">
      <a href="../../index.html" class="text-lg font-bold tracking-tight text-brand-700">TalentBridge</a>
      <nav class="hidden items-center gap-5 text-sm text-slate-600 md:flex" aria-label="Global">
        <a class="hover:text-brand-700" href="../../index.html">Experience map</a>
        <a class="hover:text-brand-700" href="#">Docs</a>
        <a class="hover:text-brand-700" href="#">Support</a>
      </nav>
      <span class="rounded-full bg-brand-50 px-3 py-1 text-xs font-semibold text-brand-700 ring-1 ring-brand-500/20">Candidate</span>
    </div>
  </header>
  <main id="main" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    <section class="card p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-brand-600">Candidate Workspace</p>
      <h1 class="mt-1 text-2xl font-bold tracking-tight">Candidate Messaging</h1>
    </section>
    <section class="grid gap-4 lg:grid-cols-3"><aside class="card p-4"><h2 class="font-semibold">Conversations</h2><ul class="mt-3 space-y-2 text-sm"><li class="rounded-lg bg-brand-50 p-2 text-brand-700">Acme Corp · Approved</li><li class="rounded-lg bg-slate-50 p-2">Nova Systems · Pending</li></ul></aside><article class="card p-4 lg:col-span-2"><div class="space-y-2 text-sm"><div class="rounded-lg bg-slate-100 p-3">Recruiter: Available Thursday? <span class="text-xs text-slate-500">10:22</span></div><div class="rounded-lg bg-brand-50 p-3 text-brand-700">You: Yes, 3pm works. <span class="text-xs text-slate-500">10:23</span></div></div><div class="mt-4 flex flex-wrap gap-2"><button class="btn-primary">Accept interview</button><button class="btn-secondary">Reject offer</button></div></article></section>
  </main>
</body>
</html>
