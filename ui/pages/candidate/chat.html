<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Messaging</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="../../index.html" class="text-lg font-bold text-indigo-700">TalentBridge</a>
      <nav class="hidden gap-4 text-sm md:flex">
        <a class="text-slate-600 hover:text-indigo-700" href="#">Dashboard</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Messages</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Reports</a>
      </nav>
      <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700">Candidate</span>
    </div>
  </header>
  <main class="mx-auto max-w-7xl space-y-6 px-4 py-6">
<section class="grid gap-4 md:grid-cols-3">
<div class="rounded-2xl bg-white p-4 ring-1 ring-slate-200"><h2 class="font-semibold">Conversations</h2><ul class="mt-3 space-y-2 text-sm"><li class="rounded-lg bg-slate-100 p-2">Acme Corp (Approved)</li></ul></div>
<div class="md:col-span-2 rounded-2xl bg-white p-4 ring-1 ring-slate-200"><h2 class="font-semibold">Chat Thread</h2><div class="mt-3 space-y-2 text-sm"><div class="rounded-lg bg-indigo-100 p-2">Recruiter: Available for interview? <span class="text-xs text-slate-500">10:12</span></div><div class="rounded-lg bg-slate-100 p-2">You: Yes, Thursday works. <span class="text-xs text-slate-500">10:13</span></div></div><div class="mt-4 flex gap-2"><input class="flex-1 rounded-xl border px-3 py-2" placeholder="Type message"/><button class="rounded-xl bg-indigo-600 px-4 py-2 text-white">Send</button></div></div>
</section></main>
</body>
</html>
