<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Profile · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 lg:px-6">
    <a href="../../index.html" class="text-lg font-bold tracking-tight text-indigo-700">TalentBridge</a>
    <nav aria-label="Primary" class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a class="text-slate-600 hover:text-indigo-700" href="../../index.html">Page map</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Support</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Settings</a>
    </nav>
    <div class="flex items-center gap-2">
      <span class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-indigo-200">Candidate</span>
      <button aria-label="Open notifications" class="rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700">Alerts</button>
    </div>
  </div>
</header>
  <main id="main-content" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    
<section class="rounded-2xl border border-slate-200 bg-white p-6">
  <h1 class="text-2xl font-bold tracking-tight">Profile setup</h1>
  <form class="mt-6 grid gap-4 md:grid-cols-2">
    <div><label for="p-role" class="text-sm font-medium">Preferred role</label><input id="p-role" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="p-salary" class="text-sm font-medium">Expected salary</label><input id="p-salary" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="p-age" class="text-sm font-medium">Age</label><input id="p-age" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="p-gender" class="text-sm font-medium">Gender</label><select id="p-gender" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>Prefer not to say</option><option>Female</option><option>Male</option></select></div>
    <div class="md:col-span-2"><label for="p-summary" class="text-sm font-medium">Professional summary</label><textarea id="p-summary" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" rows="4"></textarea></div>
    <label class="md:col-span-2 flex items-center gap-2 rounded-xl bg-slate-50 p-3 text-sm"><input type="checkbox" checked /> Searchable profile enabled</label>
    <button class="md:col-span-2 rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white">Save profile</button>
  </form>
</section>
  </main>
</body>
</html>
