<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Job Search · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 lg:px-6">
    <a href="../../index.html" class="text-lg font-bold tracking-tight text-indigo-700">TalentBridge</a>
    <nav aria-label="Primary" class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a class="text-slate-600 hover:text-indigo-700" href="../../index.html">Page map</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Support</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Settings</a>
    </nav>
    <div class="flex items-center gap-2">
      <span class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-indigo-200">Candidate</span>
      <button aria-label="Open notifications" class="rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700">Alerts</button>
    </div>
  </div>
</header>
  <main id="main-content" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    
<section class="grid gap-6 lg:grid-cols-4">
  <aside class="rounded-2xl border border-slate-200 bg-white p-4 lg:col-span-1">
    <h2 class="text-base font-semibold">Filter jobs</h2>
    <form class="mt-3 space-y-3">
      <label class="block text-sm">Role<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
      <label class="block text-sm">Location<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
      <label class="block text-sm">Salary range<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
      <label class="block text-sm">Age criteria<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
      <label class="block text-sm">Gender<select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>Any</option><option>Female</option><option>Male</option></select></label>
      <label class="block text-sm">Qualification<select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>Any</option><option>Bachelor's</option><option>Master's</option></select></label>
      <button class="w-full rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white">Apply filters</button>
    </form>
  </aside>
  <section class="space-y-4 lg:col-span-3">
    <article class="rounded-2xl border border-slate-200 bg-white p-5">
      <h3 class="text-lg font-semibold">Senior Frontend Engineer</h3>
      <p class="mt-1 text-sm text-slate-600">Remote · $90k-$115k · 4+ years · Bachelor+</p>
      <div class="mt-4 flex gap-2"><a href="job-details.html" class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white">View details</a><button class="rounded-lg border border-slate-300 px-3 py-2 text-sm">Save</button></div>
    </article>
    <article class="rounded-2xl border border-slate-200 bg-white p-5">
      <h3 class="text-lg font-semibold">Product Designer</h3>
      <p class="mt-1 text-sm text-slate-600">Berlin · €70k-€85k · 3+ years · Degree required</p>
      <div class="mt-4 flex gap-2"><a href="job-details.html" class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white">View details</a><button class="rounded-lg border border-slate-300 px-3 py-2 text-sm">Save</button></div>
    </article>
  </section>
</section>
  </main>
</body>
</html>
