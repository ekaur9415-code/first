<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="../../index.html" class="text-lg font-bold text-indigo-700">TalentBridge</a>
      <nav class="hidden gap-4 text-sm md:flex">
        <a class="text-slate-600 hover:text-indigo-700" href="#">Dashboard</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Messages</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Reports</a>
      </nav>
      <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700">Candidate</span>
    </div>
  </header>
  <main class="mx-auto max-w-7xl space-y-6 px-4 py-6">
<section class="grid gap-6 lg:grid-cols-4">
<aside class="space-y-3 rounded-2xl bg-white p-4 ring-1 ring-slate-200 lg:col-span-1">
<h2 class="font-semibold">Filters</h2>
<input class="w-full rounded-xl border px-3 py-2" placeholder="Role"/>
<input class="w-full rounded-xl border px-3 py-2" placeholder="Location"/>
<input class="w-full rounded-xl border px-3 py-2" placeholder="Salary"/>
<input class="w-full rounded-xl border px-3 py-2" placeholder="Age"/>
<select class="w-full rounded-xl border px-3 py-2"><option>Gender</option></select>
<select class="w-full rounded-xl border px-3 py-2"><option>Qualification</option></select>
<button class="w-full rounded-xl bg-indigo-600 px-4 py-2 text-white">Apply Filters</button>
</aside>
<div class="space-y-4 lg:col-span-3">
  <article class="rounded-2xl bg-white p-5 ring-1 ring-slate-200"><h3 class="font-semibold">Frontend Engineer - Remote</h3><p class="text-sm text-slate-600">$70k - $90k • 3+ years</p><button class="mt-3 rounded-lg bg-indigo-600 px-3 py-1.5 text-sm text-white">View Details</button></article>
</div>
</section></main>
</body>
</html>
