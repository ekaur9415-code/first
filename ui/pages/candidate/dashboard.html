<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="../../index.html" class="text-lg font-bold text-indigo-700">TalentBridge</a>
      <nav class="hidden gap-4 text-sm md:flex">
        <a class="text-slate-600 hover:text-indigo-700" href="#">Dashboard</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Messages</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Reports</a>
      </nav>
      <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700">Candidate</span>
    </div>
  </header>
  <main class="mx-auto max-w-7xl space-y-6 px-4 py-6">
<section class="grid gap-4 md:grid-cols-3">
<div class="rounded-2xl bg-white p-5 ring-1 ring-slate-200"><p class="text-sm text-slate-500">Matched Jobs</p><p class="text-3xl font-bold">24</p></div>
<div class="rounded-2xl bg-white p-5 ring-1 ring-slate-200"><p class="text-sm text-slate-500">Interview Requests</p><p class="text-3xl font-bold">3</p></div>
<div class="rounded-2xl bg-white p-5 ring-1 ring-slate-200"><p class="text-sm text-slate-500">Offers</p><p class="text-3xl font-bold">1</p></div>
</section>
<section class="rounded-2xl bg-white p-6 ring-1 ring-slate-200"><h2 class="text-lg font-semibold">Email Notifications</h2><ul class="mt-4 space-y-2 text-sm"><li class="rounded-xl bg-slate-100 p-3">Recruiter viewed your profile.</li><li class="rounded-xl bg-slate-100 p-3">New interview request from Acme Corp.</li></ul></section></main>
</body>
</html>
