<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
  <title>Recruiter Sign-up · TalentBridge</title>
</head>
<body class="tb-shell tb-grid-bg">
  <a href="#main" class="skip-link">Skip to main content</a>
  <div class="border-b border-white/60 bg-white/70 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 lg:px-6">
      <a href="../../index.html" class="text-lg font-bold tracking-tight text-indigo-700">TalentBridge</a>
      <div class="hidden items-center gap-6 text-sm text-slate-600 md:flex">
        <a href="../../index.html" class="hover:text-indigo-700">Product map</a>
        <a href="#" class="hover:text-indigo-700">Help center</a>
        <a href="#" class="hover:text-indigo-700">System status</a>
      </div>
      <div class="flex items-center gap-2">
        <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-indigo-200">Guest</span>
      </div>
    </div>
  </div>
  <main id="main" class="mx-auto max-w-7xl px-4 py-6 lg:px-6">
    <section class="mb-6 rounded-2xl border border-white/70 bg-white/80 p-5 shadow-sm backdrop-blur tb-glass">
      <p class="text-xs font-semibold uppercase tracking-wider text-indigo-600">Onboarding</p>
      <h1 class="mt-1 text-2xl font-bold tracking-tight text-slate-900">Recruiter Sign-up</h1>
    </section>
    
<section class="rounded-2xl border border-white/60 bg-white/85 p-6 shadow-sm">
  <p class="mb-4 rounded-xl border border-indigo-200 bg-indigo-50 p-3 text-sm text-indigo-900">Accounts open in <strong>Limited</strong> mode until admin approval.</p>
  <form class="grid gap-4 md:grid-cols-2">
    <label class="text-sm font-medium">Company<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
    <label class="text-sm font-medium">Work email<input type="email" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
    <label class="text-sm font-medium">Contact person<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
    <label class="text-sm font-medium">Phone<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></label>
    <label class="text-sm font-medium md:col-span-2">Hiring focus<textarea rows="4" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"></textarea></label>
    <button class="md:col-span-2 rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white">Create recruiter account</button>
  </form>
</section>
  </main>

</html>
