<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Sign-up · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 lg:px-6">
    <a href="../../index.html" class="text-lg font-bold tracking-tight text-indigo-700">TalentBridge</a>
    <nav aria-label="Primary" class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a class="text-slate-600 hover:text-indigo-700" href="../../index.html">Page map</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Support</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Settings</a>
    </nav>
    <div class="flex items-center gap-2">
      <span class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-indigo-200">Guest</span>
      <button aria-label="Open notifications" class="rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700">Alerts</button>
    </div>
  </div>
</header>
  <main id="main-content" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    
<section class="rounded-2xl border border-slate-200 bg-white p-6">
  <h1 class="text-2xl font-bold tracking-tight">Recruiter sign-up</h1>
  <p class="mt-2 text-sm text-slate-600">Recruiters start with <strong>limited access</strong>. Admin approval grants full platform rights.</p>
  <form class="mt-6 grid gap-4 md:grid-cols-2">
    <div><label for="r-company" class="text-sm font-medium">Company</label><input id="r-company" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="r-email" class="text-sm font-medium">Work email</label><input id="r-email" type="email" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="r-contact" class="text-sm font-medium">Contact person</label><input id="r-contact" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="r-phone" class="text-sm font-medium">Phone</label><input id="r-phone" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div class="md:col-span-2"><label for="r-focus" class="text-sm font-medium">Hiring focus</label><textarea id="r-focus" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" rows="4"></textarea></div>
    <button class="md:col-span-2 rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white">Create limited recruiter account</button>
  </form>
</section>
  </main>
</body>
</html>
