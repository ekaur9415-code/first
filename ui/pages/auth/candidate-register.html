<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Registration · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 lg:px-6">
    <a href="../../index.html" class="text-lg font-bold tracking-tight text-indigo-700">TalentBridge</a>
    <nav aria-label="Primary" class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a class="text-slate-600 hover:text-indigo-700" href="../../index.html">Page map</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Support</a>
      <a class="text-slate-600 hover:text-indigo-700" href="#">Settings</a>
    </nav>
    <div class="flex items-center gap-2">
      <span class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-indigo-200">Guest</span>
      <button aria-label="Open notifications" class="rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700">Alerts</button>
    </div>
  </div>
</header>
  <main id="main-content" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    
<section class="rounded-2xl border border-slate-200 bg-white p-6">
  <h1 class="text-2xl font-bold tracking-tight">Candidate registration</h1>
  <p class="mt-2 text-sm text-slate-600">Create a discoverable profile with qualification and preference metadata.</p>
  <form class="mt-6 grid gap-4 md:grid-cols-2" aria-label="Candidate registration form">
    <div><label for="c-name" class="text-sm font-medium">Full name</label><input id="c-name" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="c-email" class="text-sm font-medium">Email</label><input id="c-email" type="email" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="c-phone" class="text-sm font-medium">Phone</label><input id="c-phone" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="c-location" class="text-sm font-medium">Location</label><input id="c-location" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" /></div>
    <div><label for="c-qual" class="text-sm font-medium">Qualification</label><select id="c-qual" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>Bachelor's</option><option>Master's</option><option>Diploma</option></select></div>
    <div><label for="c-exp" class="text-sm font-medium">Experience</label><select id="c-exp" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>0-2 years</option><option>3-5 years</option><option>6+ years</option></select></div>
    <label class="md:col-span-2 flex items-center gap-2 rounded-xl bg-slate-50 p-3 text-sm"><input type="checkbox" checked /> Make profile searchable by recruiters</label>
    <button class="md:col-span-2 rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white">Create candidate account</button>
  </form>
</section>
  </main>
</body>
</html>
