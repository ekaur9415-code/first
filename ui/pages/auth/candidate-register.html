<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Registration</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="../../index.html" class="text-lg font-bold text-indigo-700">TalentBridge</a>
      <nav class="hidden gap-4 text-sm md:flex">
        <a class="text-slate-600 hover:text-indigo-700" href="#">Dashboard</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Messages</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Reports</a>
      </nav>
      <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700">Guest</span>
    </div>
  </header>
  <main class="mx-auto max-w-7xl space-y-6 px-4 py-6">
<section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
<h1 class="text-2xl font-bold">Candidate Registration</h1>
<form class="mt-6 grid gap-4 md:grid-cols-2">
<input class="rounded-xl border px-3 py-2" placeholder="Full name"/>
<input class="rounded-xl border px-3 py-2" placeholder="Email"/>
<input class="rounded-xl border px-3 py-2" placeholder="Phone"/>
<input class="rounded-xl border px-3 py-2" placeholder="Location"/>
<select class="rounded-xl border px-3 py-2"><option>Highest Qualification</option></select>
<select class="rounded-xl border px-3 py-2"><option>Years of Experience</option></select>
<label class="md:col-span-2 flex items-center gap-2 text-sm"><input type="checkbox" checked/> Make profile searchable</label>
<button class="md:col-span-2 rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white">Create Candidate Account</button>
</form></section></main>
</body>
</html>
