<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Registration · TalentBridge</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-brand-50: #eef2ff;
      --color-brand-500: #6366f1;
      --color-brand-600: #4f46e5;
      --color-brand-700: #4338ca;
      --color-surface: #ffffff;
      --color-app: #f8fafc;
      --radius-card: 1rem;
      --shadow-soft: 0 10px 30px -12px rgb(2 6 23 / 0.2);
    }

    @utility card {
      @apply rounded-card border border-slate-200/70 bg-surface shadow-soft;
    }

    @utility btn-primary {
      @apply inline-flex items-center justify-center rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700;
    }

    @utility btn-secondary {
      @apply inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50;
    }
  </style>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="bg-app text-slate-900">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 lg:px-6">
      <a href="../../index.html" class="text-lg font-bold tracking-tight text-brand-700">TalentBridge</a>
      <nav class="hidden items-center gap-5 text-sm text-slate-600 md:flex" aria-label="Global">
        <a class="hover:text-brand-700" href="../../index.html">Experience map</a>
        <a class="hover:text-brand-700" href="#">Docs</a>
        <a class="hover:text-brand-700" href="#">Support</a>
      </nav>
      <span class="rounded-full bg-brand-50 px-3 py-1 text-xs font-semibold text-brand-700 ring-1 ring-brand-500/20">Guest</span>
    </div>
  </header>
  <main id="main" class="mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-6">
    <section class="card p-5">
      <p class="text-xs font-semibold uppercase tracking-wider text-brand-600">Onboarding</p>
      <h1 class="mt-1 text-2xl font-bold tracking-tight">Candidate Registration</h1>
    </section>
    <section class="card p-6"><form class="grid gap-4 md:grid-cols-2"><label class="text-sm">Full name<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"/></label><label class="text-sm">Email<input type="email" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"/></label><label class="text-sm">Phone<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"/></label><label class="text-sm">Location<input class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"/></label><label class="text-sm">Qualification<select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>Bachelor's</option><option>Master's</option></select></label><label class="text-sm">Experience<select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>0-2 years</option><option>3-5 years</option></select></label><label class="md:col-span-2 flex items-center gap-2 rounded-xl bg-slate-50 p-3 text-sm"><input type="checkbox" checked/>Searchable profile</label><button class="btn-primary md:col-span-2">Create account</button></form></section>
  </main>
</body>
</html>
