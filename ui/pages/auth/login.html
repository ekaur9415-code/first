<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login & Role Access</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="../../index.html" class="text-lg font-bold text-indigo-700">TalentBridge</a>
      <nav class="hidden gap-4 text-sm md:flex">
        <a class="text-slate-600 hover:text-indigo-700" href="#">Dashboard</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Messages</a>
        <a class="text-slate-600 hover:text-indigo-700" href="#">Reports</a>
      </nav>
      <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700">Guest</span>
    </div>
  </header>
  <main class="mx-auto max-w-7xl space-y-6 px-4 py-6">
<section class="grid gap-6 md:grid-cols-2">
  <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <h1 class="text-2xl font-bold">Welcome back</h1>
    <p class="mt-2 text-sm text-slate-600">Sign in to continue with role-based access.</p>
    <form class="mt-6 space-y-4">
      <label class="block text-sm font-medium">Email<input type="email" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"/></label>
      <label class="block text-sm font-medium">Password<input type="password" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"/></label>
      <label class="block text-sm font-medium">Role
        <select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2"><option>Candidate</option><option>Recruiter</option><option>Admin</option></select>
      </label>
      <button class="w-full rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white">Login</button>
    </form>
  </div>
  <div class="space-y-4 rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <h2 class="text-lg font-semibold">Access levels</h2>
    <div class="rounded-xl bg-amber-50 p-4 text-sm text-amber-900"><strong>Limited:</strong> Basic browsing, request upgrade.</div>
    <div class="rounded-xl bg-emerald-50 p-4 text-sm text-emerald-900"><strong>Full:</strong> Messaging, CV download, full search.</div>
    <div class="rounded-xl bg-slate-100 p-4 text-sm">Forgot password and MFA placeholders.</div>
  </div>
</section></main>
</body>
</html>
